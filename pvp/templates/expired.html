<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Session Expired — SapheroBot PVP</title>
  <link rel="stylesheet" href="/static/game.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .expired-box {
      text-align: center;
      padding: 48px 40px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      max-width: 480px;
    }
    .expired-icon { font-size: 4rem; margin-bottom: 16px; }
    .expired-box h1 { font-size: 1.6rem; color: var(--red); margin-bottom: 8px; }
    .expired-box p  { color: var(--muted); font-size: .95rem; line-height: 1.6; }
    .expired-box .hint {
      margin-top: 24px;
      padding: 14px 18px;
      background: rgba(255,255,255,.04);
      border-radius: 8px;
      font-size: .82rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="expired-box">
    <div class="expired-icon">⚔️</div>
    <h1>Session Not Found</h1>
    <p>This battle session has expired or the link is invalid.<br>
       Sessions expire after <strong>2 hours</strong> of inactivity.</p>
    <div class="hint">
      To start a new battle, use <strong>/pvp challenge @player</strong> on Discord,
      or ask the server admin to send you a fresh link.
    </div>
  </div>
</body>
</html>
